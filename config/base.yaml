api:
  host: "0.0.0.0"
  port: 8000
streamlit:
  port: 8501
paths:
  output_root: "outputs/jobs"
providers:
  mode: "mock"
  search_provider: "mock"
mock_paths:
  pdf_dir: "mock_dbx/dbfs"
  gst_uc_csv: "mock_dbx/uc/gst_returns_sample.csv"
  bank_uc_csv: "mock_dbx/uc/bank_transactions_sample.csv"
contracts:
  strict: true
llm:
  provider_preferred: "openai"
  model_map:
    vision: "gpt-4o"
    json_repair: "gpt-4o-mini"
    reasoning_primary: "claude-sonnet-4-6"
  anthropic:
    thinking:
      type: "adaptive"
  timeouts_sec:
    short: 20
    medium: 60
  retries: 2
  max_tokens:
    vision: 2000
    reasoning: 3000
    repair: 1500
  enable_cache: true
search:
  provider: "mock"      # mock | perplexity | tavily | bing | serpapi
  mode: "ensemble"
  providers: ["perplexity", "tavily", "serpapi"]
  fusion:
    method: "rrf"
    rrf_k: 60
  limits:
    top_k_per_provider: 5
    max_merged: 10
    risk_escalation_enabled: true
    max_merged_high_risk: 25
    top_k_per_provider_high_risk: 10
  serpapi:
    engine: "google"
    hl: "en"
    gl: "in"
    num: 10
    safe: "off"
  perplexity:
    freshness_days: 365
  freshness_days: 365
features:
  enable_live_llm: false         # Phase 3
  enable_live_search: false      # search providers
  enable_live_databricks: false  # DBFS/UC
governance:
  contracts_version: "0.1.0"
  validation:
    strict: true
    fail_on_critical: true
  evidence:
    store_page_images: false
    compute_checksums: true
  logging:
    json: true
    rotation_mb: 10
    retention_runs: 20
  metrics:
    enable: true
  redaction:
    enable_pii_redaction: true
    pii_patterns:
      - "PAN"
      - "Aadhaar"
      - "IFSC"
gates:
  critical_needs_verification:
    - "kyc_missing"
    - "audit_report_missing"
  missing_data_policy: "REFER"

signals:
  spike:
    method: "mad"          # "mad" | "iqr"
    z_threshold: 3.0
    rel_threshold: 0.6     # 60% above baseline
    min_points: 6
    rolling_window: 6      # months for trailing median; fallback to global
  reversal:
    window_k: 2
    offset_ratio_min: 0.7
  weights:
    spike: 10
    reversal: 25
    cap: 100

decision:
  base_score: 60
  adjustments:
    gst_bank_mismatch: -10
    adverse_per_item: -15
    primary_delta_cap: 10
  policy_matrix:
    - when:
        entity_confidence_lt: 0.6
        adverse_count_gte: 1
      action: "REFER"
      driver: "Low entity confidence with adverse media"
    - when:
        circular_trading_risk_gte: 60
      action: "REFER"
      driver: "Spike-reversal pattern suggests circular trading"
    - when:
        legal_hits_gt: 0
      action: "REFER"
      driver: "Open legal proceedings detected"
  pricing:
    min_rate: 9.0
    max_rate: 16.0
    slope_per_score: 0.1
    min_limit: 500000
    max_limit: 5000000
    k_limit: 25000
integrations:
  databricks:
    enabled: false
    mode: "mock"        # mock | live
    files_root: "dbfs:/Shared/credit_docs"   # used in live mode
    sql_warehouse: ""   # name or id
    catalog: ""         # e.g., main
    schema: ""          # e.g., credit
    gst_table: "gst_returns"
    bank_table: "bank_transactions"
    timeouts_sec: {short: 20, medium: 60}
    retries: 2
security:
  max_request_mb: 10
  allowed_origins: ["http://localhost:8501"]
  redact_keys_in_logs: true

billing:
  currency: "INR"
  openai:
    gpt-4o:
      prompt_per_1k: 0.0
      completion_per_1k: 0.0
    gpt-4o-mini:
      prompt_per_1k: 0.0
      completion_per_1k: 0.0
  anthropic:
    claude-sonnet-4-6:
      prompt_per_1k: 0.0
      completion_per_1k: 0.0
  search:
    perplexity_per_call: 0.0
    tavily_per_call: 0.0
    bing_per_call: 0.0

metrics:
  prometheus:
    enabled: true
