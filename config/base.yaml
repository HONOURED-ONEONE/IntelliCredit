api:
  host: "0.0.0.0"
  port: 8000
streamlit:
  port: 8501
paths:
  output_root: "outputs/jobs"
providers:
  mode: "mock"
  search_provider: "mock"
mock_paths:
  pdf_dir: "mock_dbx/dbfs"
  gst_uc_csv: "mock_dbx/uc/gst_returns_sample.csv"
  bank_uc_csv: "mock_dbx/uc/bank_transactions_sample.csv"
contracts:
  strict: true
llm:
  provider_preferred: "openai"
  model_map:
    vision: "gpt-4o"
    json_repair: "gpt-4o-mini"
    reasoning_primary: "claude-3-7-sonnet-2025-10-22"
  timeouts_sec:
    short: 20
    medium: 60
  retries: 2
  max_tokens:
    vision: 2000
    reasoning: 3000
    repair: 1500
  enable_cache: true
search:
  provider: "mock"      # mock | perplexity | tavily | bing
  perplexity:
    freshness_days: 365
  freshness_days: 365
features:
  enable_live_llm: false         # Phase 3
  enable_live_search: false      # search providers
  enable_live_databricks: false  # DBFS/UC
governance:
  contracts_version: "0.1.0"
  validation:
    strict: true
    fail_on_critical: true
  evidence:
    store_page_images: false
    compute_checksums: true
  logging:
    json: true
    rotation_mb: 10
    retention_runs: 20
  metrics:
    enable: true
  redaction:
    enable_pii_redaction: true
    pii_patterns:
      - "PAN"
      - "Aadhaar"
      - "IFSC"
gates:
  critical_needs_verification:
    - "kyc_missing"
    - "audit_report_missing"
  missing_data_policy: "REFER"
decision:
  base_score: 60
  adjustments:
    gst_bank_mismatch: -10
    adverse_per_item: -15
    primary_delta_cap: 10
  pricing:
    min_rate: 9.0
    max_rate: 16.0
    slope_per_score: 0.1
    min_limit: 500000
    max_limit: 5000000
    k_limit: 25000
integrations:
  databricks:
    enabled: false
    mode: "mock"        # mock | live
    files_root: "dbfs:/Shared/credit_docs"   # used in live mode
    sql_warehouse: ""   # name or id
    catalog: ""         # e.g., main
    schema: ""          # e.g., credit
    gst_table: "gst_returns"
    bank_table: "bank_transactions"
    timeouts_sec: {short: 20, medium: 60}
    retries: 2
security:
  max_request_mb: 10
  allowed_origins: ["http://localhost:8501"]
  redact_keys_in_logs: true
