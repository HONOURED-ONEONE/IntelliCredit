api:
  host: "0.0.0.0"
  port: 8000
streamlit:
  port: 8501
paths:
  output_root: "outputs/jobs"
providers:
  mode: "mock"
  search_provider: "mock"
mock_paths:
  pdf_dir: "mock_dbx/dbfs"
  gst_uc_csv: "mock_dbx/uc/gst_returns_sample.csv"
  bank_uc_csv: "mock_dbx/uc/bank_transactions_sample.csv"
contracts:
  strict: true
llm:
  provider_preferred: "openai"
  model_map:
    vision: "gpt-4o"
    json_repair: "gpt-4o-mini"
    reasoning_primary: "claude-3-7-sonnet-2025-10-22"
  timeouts_sec:
    short: 20
    medium: 60
  retries: 2
  max_tokens:
    vision: 2000
    reasoning: 3000
    repair: 1500
  enable_cache: true
search:
  provider: "mock"
  perplexity:
    freshness_days: 365
features:
  enable_live_llm: false
  enable_live_search: false
