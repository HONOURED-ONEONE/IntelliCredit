version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./mock_dbx:/app/mock_dbx
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./mock_dbx:/app/mock_dbx
    environment:
      - API_HOST=api
      - API_PORT=8000
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
